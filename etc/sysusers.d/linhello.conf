# Create the `linhello` system group. linhellod chowns its control socket
# (/run/linhello.sock) to root:linhello 0660 so group members can run the
# unprivileged CLI (status/test/doctor/position) without sudo; root/PAM never
# needs it. Declarative so packaging (rpm/deb) and `make install` create the
# group the same way — systemd-sysusers processes this on install and at boot.
#
# This only creates the GROUP. Adding a login user to it is a separate, explicit
# step (`linhello setup`, or `usermod -aG linhello <user>`), and takes effect at
# that user's next login.
#
#Type Name     ID  GECOS  Home  Shell
g     linhello -
