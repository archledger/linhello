name: CI

on:
  push:
    branches: [main, "port/**"]
  pull_request:

jobs:
  fedora:
    name: Fedora build, test & rpm
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      # fedora:latest ships no git, so actions/checkout would fall back to a
      # tarball (no .git) and the later `git archive HEAD` fails with "not a git
      # repository". Install git BEFORE checkout so it does a real clone.
      - name: Install git for a real checkout
        run: dnf -y install git

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          # Resolve the spec's BuildRequires through the package manager (incl.
          # macro-expanded ones like pkgconfig(systemd)) instead of hand-listing
          # them — that's the recurring source of "Failed build dependencies".
          dnf install -y 'dnf-command(builddep)' rpm-build rpmlint checkpolicy
          dnf builddep -y packaging/fedora/linhello.spec

      - name: Hardware-free unit tests
        run: cargo test --release -p linhello-common -p linhello-core

      - name: Lint the rpm spec
        run: rpmlint packaging/fedora/linhello.spec

      - name: Build the SELinux daemon module
        run: make -C etc/selinux -f /usr/share/selinux/devel/Makefile linhello-daemon.pp

      - name: Build the rpm
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          ver=$(rpmspec -q --qf '%{version}\n' packaging/fedora/linhello.spec | head -1)
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,BUILD,RPMS,SRPMS}
          git archive --format=tar.gz --prefix="linhello-${ver}/" \
            -o ~/rpmbuild/SOURCES/linhello-${ver}.tar.gz HEAD
          rpmbuild -bb packaging/fedora/linhello.spec

      - name: Upload rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: linhello-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm
          if-no-files-found: error

  debian:
    name: Debian build, test & deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            debhelper devscripts dpkg-dev fakeroot \
            clang libclang-dev pkg-config \
            libtss2-dev libssl-dev libpam0g-dev

      - name: Use a recent Rust toolchain
        # ort's MSRV (1.81) outpaces the apt `rustc` on older Ubuntu.
        uses: dtolnay/rust-toolchain@stable

      - name: Hardware-free unit tests
        run: cargo test --release -p linhello-common -p linhello-core

      - name: Sanity-check the Debian changelog
        run: dpkg-parsechangelog -l packaging/debian/changelog

      - name: Build the .deb
        run: |
          cp -rT packaging/debian debian
          # -d skips the apt cargo/rustc build-dep check; the rustup toolchain
          # above provides a new-enough compiler for ort.
          dpkg-buildpackage -b -us -uc -d
          mkdir -p dist && cp ../linhello_*_*.deb dist/

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linhello-deb
          path: dist/*.deb
          if-no-files-found: error

  # The Arch makepkg job stays deferred — add it once the PKGBUILD is
  # build-tested on a native Arch box.
